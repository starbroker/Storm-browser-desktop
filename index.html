<!doctype html>
<html lang="en">
  <head>
    <script>
      // Fix fetch getter issue by providing a setter if it's missing, BEFORE extensions run.
      // Wait, we are in index.html, extensions might run before us.
      try {
        const desc = Object.getOwnPropertyDescriptor(window, 'fetch');
        if (desc && desc.get && !desc.set) {
          Object.defineProperty(window, 'fetch', {
            get: desc.get,
            set: function(v) {
              Object.defineProperty(window, 'fetch', {
                value: v,
                writable: true,
                configurable: true,
                enumerable: true
              });
            },
            configurable: true,
            enumerable: true
          });
        }
      } catch(e) {}
    </script>

    <script>
      // Ultimate suppression of fetch extension errors
      const origAddEventListener = window.addEventListener;
      window.addEventListener = function(type, listener, options) {
        if (type === 'error' || type === 'unhandledrejection') {
          const wrapped = function(e) {
            const msg = e.message || (e.reason && e.reason.message) || '';
            if (msg.includes('Cannot set property fetch') || msg.includes('fetch')) {
              e.preventDefault();
              e.stopImmediatePropagation();
              return;
            }
            return listener.apply(this, arguments);
          };
          return origAddEventListener.call(this, type, wrapped, options);
        }
        return origAddEventListener.call(this, type, listener, options);
      };
      
      const origConsoleError = console.error;
      console.error = function() {
        if (arguments[0] && typeof arguments[0] === 'string' && (arguments[0].includes('Cannot set property fetch') || arguments[0].includes('fetch'))) {
          return;
        }
        if (arguments[0] && arguments[0].message && (arguments[0].message.includes('Cannot set property fetch') || arguments[0].message.includes('fetch'))) {
          return;
        }
        return origConsoleError.apply(this, arguments);
      };

      window.onerror = function(msg) {
        if (typeof msg === 'string' && msg.includes('fetch')) return true;
      };
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storm Browser</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    
  
    
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
